<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Habibi Airways</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --red: #C8102E; --red-d: #9e0b22; --gold: #C9A84C;
        --ink: #0D0D0D; --ink2: #1A1A1A; --ink3: #333; --ink4: #555; --ink5: #888;
        --line: #E0E0E0; --line2: #EBEBEB; --line3: #F5F5F5;
        --bg: #F8F7F4; --white: #fff;
        --serif: 'Cormorant Garamond', Georgia, serif;
        --sans: 'DM Sans', system-ui, sans-serif;
        --nav-h: 66px; --util-h: 34px;
        --r: 5px; --r-lg: 8px;
        --sh: 0 2px 16px rgba(0,0,0,.08);
        --sh-lg: 0 12px 48px rgba(0,0,0,.15);
      }
      html { scroll-behavior: smooth; font-size: 14px; }
      body { font-family: var(--sans); color: var(--ink3); background: #fff; line-height: 1.6; -webkit-font-smoothing: antialiased; }
      #root { min-height: 100vh; display: flex; flex-direction: column; }
      a { color: inherit; text-decoration: none; }
      img { display: block; }
      button, input, select, textarea { font-family: var(--sans); }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: var(--red); border-radius: 2px; }
      ::selection { background: rgba(200,16,46,.13); }
      .page-wrap { flex: 1; }
      .container { max-width: 1320px; margin: 0 auto; padding: 0 24px; width: 100%; }
      @keyframes fadeUp    { from { opacity:0; transform:translateY(22px); } to { opacity:1; transform:translateY(0); } }
      @keyframes fadeIn    { from { opacity:0 } to { opacity:1 } }
      @keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
      @keyframes spin      { to { transform:rotate(360deg); } }
      @keyframes shimmer   { 0%{ background-position:-400px 0 } 100%{ background-position:400px 0 } }
      @keyframes ticker    { 0%{ transform:translateX(0) } 100%{ transform:translateX(-50%) } }
      @keyframes blink     { 0%,100%{ opacity:1 } 50%{ opacity:.3 } }
      @keyframes confettiFall { 0%{ transform:translateY(-10px) rotate(0deg); opacity:1; } 100%{ transform:translateY(110vh) rotate(720deg); opacity:0; } }
      .animate-fadeUp    { animation: fadeUp .6s ease both; }
      .animate-slideDown { animation: slideDown .2s ease both; }
      .card-hover { transition: transform .3s, box-shadow .3s; }
      .card-hover:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(0,0,0,.13); }
      .btn-red { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:11px 26px; background:var(--red); color:#fff; border:none; font-weight:700; font-size:14px; border-radius:var(--r); cursor:pointer; box-shadow:0 3px 12px rgba(200,16,46,.3); transition:all .2s; white-space:nowrap; font-family:var(--sans); }
      .btn-red:hover { background:var(--red-d); transform:translateY(-1px); }
      .btn-red:disabled { background:#AAA; box-shadow:none; cursor:not-allowed; transform:none; }
      .btn-outline { display:inline-flex; align-items:center; gap:6px; padding:10px 22px; background:transparent; color:var(--red); border:1.5px solid var(--red); font-weight:600; font-size:13.5px; border-radius:var(--r); cursor:pointer; transition:all .2s; white-space:nowrap; font-family:var(--sans); }
      .btn-outline:hover { background:rgba(200,16,46,.05); }
      .btn-ghost { display:inline-flex; align-items:center; gap:6px; padding:9px 18px; background:transparent; color:var(--ink4); border:1px solid var(--line); font-size:13px; border-radius:var(--r); cursor:pointer; transition:all .2s; font-family:var(--sans); }
      .btn-ghost:hover { border-color:var(--red); color:var(--red); }
      .field-input { width:100%; padding:10px 13px; border:1px solid var(--line); border-radius:var(--r); font-size:13.5px; color:var(--ink2); outline:none; font-family:var(--sans); background:#fff; transition:border-color .2s; box-sizing:border-box; }
      .field-input:focus { border-color:var(--red); }
      .field-input:disabled { background:#F5F5F5; color:#AAA; cursor:not-allowed; }
      .field-label { display:block; font-size:11.5px; font-weight:600; color:var(--ink4); margin-bottom:5px; text-transform:uppercase; letter-spacing:.6px; }
      .skeleton { background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%); background-size:400px 100%; animation:shimmer 1.4s ease infinite; border-radius:4px; }
      .data-table { width:100%; border-collapse:collapse; }
      .data-table th { padding:10px 14px; font-size:11px; font-weight:700; color:#888; text-transform:uppercase; letter-spacing:.8px; border-bottom:2px solid var(--line2); background:#FAFAFA; text-align:left; white-space:nowrap; }
      .data-table td { padding:12px 14px; font-size:13px; color:var(--ink2); border-bottom:1px solid var(--line3); vertical-align:middle; }
      .data-table tr:hover td { background:#FAFAFA; }
      .tag { display:inline-block; padding:3px 9px; border-radius:100px; font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
      .tag-red   { background:var(--red); color:#fff; }
      .tag-green { background:#E8F5E9; color:#2E7D32; }
      .tag-blue  { background:#E3F2FD; color:#1565C0; }
      .tag-amber { background:#FFF8E1; color:#F57F17; }
      .tag-purple{ background:#F3E5F5; color:#6A1B9A; }
      .tag-gray  { background:#F5F5F5; color:#777; }
      @media (max-width: 768px) { 
        .hide-mobile { display:none !important; } 
        .container { padding: 0 16px !important; } 
        :root { --nav-h: 56px; }
        [style*="grid-template-columns"] { grid-template-columns: 1fr !important; gap: 16px !important; }
        [style*="flex-direction: row"] { flex-direction: column !important; }
        .hero-h1 { font-size: 2.2rem !important; }
        .hero-eyebrow { font-size: 9px !important; }
        .hero-sub { font-size: 14px !important; }
        .desktop-only { display: none !important; }
        .mobile-col { flex-direction: column !important; }
        /* Make sure searchbox elements stack correctly */
        input[type="date"] { font-size: 16px !important; }
        button { font-size: 14px !important; padding: 12px 20px !important; }
      }
      /* Hide Google Translate UI */
      .goog-te-banner-frame { display: none !important; }
      body { top: 0px !important; }
      #google_translate_element { display: none !important; }
      .skiptranslate, iframe.skiptranslate { display: none !important; }
      .goog-tooltip, .goog-tooltip:hover { display: none !important; }
      .goog-text-highlight { background-color: transparent !important; border: none !important; box-shadow: none !important; }
      /* Hide the floating bubble */
      .VIpgJd-Zvi9od-aZ2wEe-wOHMyf, .VIpgJd-Zvi9od-ORHb-OEVmcd, .goog-te-gadget-icon { display: none !important; }
    </style>
  </head>
  <body>
    <div id="google_translate_element"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <div id="root"></div>
  </body>
</html>
